<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shark AI Cursor Emulator 🦈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .canvas-wrapper { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { display: none; }
        canvas { position: absolute; transform: scaleX(-1); border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        .ui-float { position: absolute; top: 20px; z-index: 10; pointer-events: none; }
        .data-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; border-radius: 1rem; }
    </style>
</head>
<body>

    <div class="canvas-wrapper">
        <video id="input_video" autoplay playsinline></video>
        <canvas id="output_canvas" width="1280" height="720"></canvas>
        
        <div class="ui-float">
            <div class="data-card">
                <h1 class="text-xl font-bold text-blue-400">🦈 Shark AI Cursor Emulator</h1>
                <p id="gesture-text" class="text-lg text-white font-mono">Status: Mencari Tangan...</p>
                <div class="mt-2 text-sm text-gray-400">
                    <p>• Telunjuk: Gerak Kursor</p>
                    <p>• Cubit (Jempol+Telunjuk): Klik</p>
                    <p>• Genggam (C-Shape): Simulasi Knob Volume</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gestureText = document.getElementById('gesture-text');

        function calculateDistance(a, b) {
            return Math.sqrt((a.x - b.x)**2 + (a.y - b.y)**2 + (a.z - b.z)**2);
        }

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#38bdf8', lineWidth: 3});
                    drawLandmarks(canvasCtx, landmarks, {color: '#fbbf24', lineWidth: 1, radius: 4});

                    // 1. Logic: Cursor (Index Tip - LM 8)
                    const indexTip = landmarks[8];
                    
                    // 2. Logic: Click (Thumb Tip - LM 4 & Index Tip - LM 8)
                    const distPinch = calculateDistance(landmarks[4], landmarks[8]);
                    
                    // 3. Logic: C-Shape/Knob (Dist Thumb tip & Index base)
                    const distKnob = calculateDistance(landmarks[4], landmarks[5]);

                    let action = "Move Mode";
                    if (distPinch < 0.05) {
                        action = "🔥 CLICK DETECTED!";
                        canvasCtx.fillStyle = 'rgba(239, 68, 68, 0.5)';
                        canvasCtx.beginPath();
                        canvasCtx.arc(indexTip.x * canvasElement.width, indexTip.y * canvasElement.height, 30, 0, 2 * Math.PI);
                        canvasCtx.fill();
                    } else if (distKnob > 0.15 && distKnob < 0.25) {
                        action = "🎛️ KNOB CONTROL (Volume)";
                        canvasCtx.fillStyle = 'rgba(34, 197, 94, 0.5)';
                        canvasCtx.beginPath();
                        canvasCtx.arc(indexTip.x * canvasElement.width, indexTip.y * canvasElement.height, 40, 0, 2 * Math.PI);
                        canvasCtx.fill();
                    }

                    gestureText.innerText = `Action: ${action}`;
                }
            } else {
                gestureText.innerText = "Status: Mencari Tangan...";
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
